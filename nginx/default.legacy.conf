# ─── ROLLBACK CONF — P8.1 → pre-P8.1 emergency fallback ───────────────
#
# Use this conf when next-app is broken in prod and you need every SEO
# surface back on legacy Express in one nginx restart. Every location
# block that previously routed to `next_app` is removed; the catch-all
# `location /` at the bottom carries the entire surface (root,
# /anime/:id, /seasonal, /search, /welcome, /sitemap.xml, /robots.txt).
# Express has working handlers for all of them (server/index.js +
# ogTagsMiddleware + sitemap.js).
#
# How to switch on the VPS:
#   ssh vps 'cd /opt/animego \
#     && cp nginx/default.conf nginx/default.p8.1.conf.bak \
#     && cp nginx/default.legacy.conf nginx/default.conf \
#     && docker compose restart nginx'
#
# The restart (not reload) is required: nginx default.conf is a
# bind-mount, and inode swaps make reload read a stale fd.
# Memory: feedback_deploy_nginx_bind_mount_restart.
#
# Rolling forward again (after the next-app fix lands):
#   cp nginx/default.p8.1.conf.bak nginx/default.conf
#   docker compose restart nginx
#
# Acceptable degradation during rollback window:
# - /seasonal/* — Express has no handler, falls through SPA, regresses
#   to legacy /season route (the only seasonal surface in pre-P8.1)
# - SEO meta tags for /anime/:id — Express ogTagsMiddleware writes them
#   for crawler UA only; non-crawler hits get the SPA shell. Same as
#   the pre-P8.1 baseline.

upstream app {
    server app:5001;
}

# P2.8: ws-server upstream — wired for the P9 cutover; not on the request
# path yet. Kept here to make the diff between this conf and the active
# default.conf as small as possible.
upstream ws_server {
    server ws-server:3001;
}

server {
    listen 80;
    server_name animegoclub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name www.animegoclub.com;
    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.animegoclub.com;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    server_name animegoclub.com localhost;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # WebSocket (socket.io danmaku) — stays on legacy Express.
    location /socket.io/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API → legacy Express.
    location /api/ {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # ─── NO next-app routes in this rollback conf ─────────────────────
    # Everything (/, /anime/*, /seasonal*, /search, /welcome,
    # /sitemap.xml, /robots.txt, /_next/*) falls through to catch-all
    # below. /_next/* will 404 against Express, which is fine — the
    # legacy SPA shell never asks for Next chunks.
    #
    # The only redirect kept: /about → /welcome (preserves the backlink
    # equity that motivated the original 301).
    location = /about {
        return 301 /welcome;
    }

    # ─── Catch-all → legacy Express ──────────────────────────────────
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob: wss://$host https://cloudflareinsights.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), local-fonts=(self)" always;
}
