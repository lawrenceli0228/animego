# ─── ROLLBACK CONF — partial rollback to legacy Express for SEO only ───
#
# When to use:
#   next-app container is unrecoverably broken in prod. This conf strips
#   every next-app upstream block out of routing so the public SEO
#   surface falls back to the legacy Express SPA shell.
#
# Quick switch (on the VPS):
#   ssh vps 'cd /opt/animego \
#     && cp nginx/default.conf nginx/default.p8.1.conf.bak \
#     && cp nginx/default.legacy.conf nginx/default.conf \
#     && docker compose restart nginx'
#
# Restart (not reload) is mandatory: the conf file is a bind-mount, and
# inode swaps from `cp` leave nginx reload reading a stale fd.
# Memory: feedback_deploy_nginx_bind_mount_restart.md.
#
# Rolling forward again, after the next-app fix lands:
#   cp nginx/default.p8.1.conf.bak nginx/default.conf
#   docker compose restart nginx
#
# ─── What works after rollback ────────────────────────────────────────
# Legacy Express still has working handlers for:
#   /                      landing SPA shell
#   /search                Express ogTags + SPA
#   /anime/:id             Express ogTagsMiddleware (crawler UA only);
#                          non-crawler hits get the SPA shell
#   /seasonal/*            falls through SPA → legacy /season route
#                          (regression from next-app /seasonal but
#                          functional)
#   /welcome               Express welcome route
#   /about                 still 301 → /welcome (backlink equity)
#   /profile, /calendar, /faq, /u/*
#                          full legacy Express + SPA
#   /api/*                 unchanged (Express)
#   /socket.io/*           unchanged (Express)
#
# ─── What is BROKEN after rollback ────────────────────────────────────
# These routes were ported to next-app in P6 / P7 / P9 AND their legacy
# Express SPA shells were deleted in the same milestones:
#
#   /library, /library/:seriesId   P6.9 (commit f3c6a03 — legacy SPA delete)
#   /player                        P6.9 (same commit)
#   /admin, /admin/*               P7   (commit 96795f5 — legacy SPA delete)
#   /login                         P9   (commit 8658437 ports → next-app)
#   /register                      P9   (commit 95734e2 ports → next-app)
#   /forgot-password               P9   (commit ee14e3c ports → next-app)
#   /reset-password/:token         P9   (commit ee14e3c ports → next-app)
#
# Letting these fall through to legacy Express would either 404 or serve
# a broken half-SPA. Instead each one returns 503 → /maintenance.html so
# users see a clean "temporarily unavailable" page.
#
# If rollback needs to actually serve /library / /admin / /login —
# meaning next-app outage is severe AND the user-facing impact of losing
# those surfaces is unacceptable — the only recovery is to revert past
# the P6.9 / P7 / P9 commits and rebuild the legacy `app` image. That is
# outside this conf's responsibility.

upstream app {
    server app:5001;
}

# P2.8: ws-server upstream — wired for the P9 cutover; not on the request
# path yet. Kept here to make the diff between this conf and the active
# default.conf as small as possible.
upstream ws_server {
    server ws-server:3001;
}

server {
    listen 80;
    server_name animegoclub.com;
    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name www.animegoclub.com;
    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.animegoclub.com;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    server_name animegoclub.com localhost;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # Fail-fast upstream defaults (kept in sync with default.conf so the
    # two confs behave the same on Express timeouts).
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 30s;

    # Maintenance page wiring. Routes whose legacy SPA shell was deleted
    # in P6/P7/P9 explicitly `return 503` below; nginx maps that to the
    # static maintenance.html mounted at /usr/share/nginx/html/.
    error_page 502 503 504 =503 /maintenance.html;
    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
    }

    # WebSocket (socket.io danmaku) — stays on legacy Express.
    location /socket.io/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API → legacy Express.
    location /api/ {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # ─── Routes with no legacy handler — serve maintenance page ─────────
    # See the top-of-file table for which milestone deleted each SPA shell.
    # `^~` / `=` ranks above the catch-all so these never fall through.
    location ^~ /library {
        return 503;
    }
    location ^~ /player {
        return 503;
    }
    location ^~ /admin {
        return 503;
    }
    location = /login {
        return 503;
    }
    location = /register {
        return 503;
    }
    location = /forgot-password {
        return 503;
    }
    location ^~ /reset-password/ {
        return 503;
    }
    # Trailing-slash forms — same 503 instead of 301-then-503 since the
    # canonical bare form is broken regardless.
    location = /login/ {
        return 503;
    }
    location = /register/ {
        return 503;
    }
    location = /forgot-password/ {
        return 503;
    }
    location = /reset-password {
        return 503;
    }

    # /about → /welcome — preserves backlink equity from the old
    # marketing URL. Express has /welcome.
    location = /about {
        return 301 /welcome;
    }

    # ─── Catch-all → legacy Express ──────────────────────────────────
    # /, /search, /anime/*, /seasonal/*, /welcome, /profile, /calendar,
    # /faq, /u/*, /sitemap.xml, /robots.txt all land here. /_next/* will
    # 404 against Express — that's fine; the legacy SPA shell never asks
    # for Next chunks.
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers (kept in sync with default.conf)
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob: wss://$host https://cloudflareinsights.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), local-fonts=(self)" always;
}
