# ═══════════════════════════════════════════════════════════════════════
# P9 CUTOVER CONFIG — flips the API + WebSocket data plane onto the Go stack.
#
# Identical to nginx/default.conf (P8.1 routing) EXCEPT:
#   - go_api upstream is ENABLED (was commented out in default.conf).
#   - location /api/        proxy_pass  http://app  ->  http://go_api
#   - location /socket.io/  proxy_pass  http://app  ->  http://ws_server
# Every next-app location, the maintenance error_page, timeouts, SSL, and
# security headers are byte-for-byte the same as default.conf.
#
# Apply at cutover (T+0):
#   cp nginx/default.p9.conf nginx/default.conf
#   docker compose restart nginx
# (restart, NOT reload: git pull swaps the bind-mounted file's inode, and
#  nginx -s reload keeps reading the old inode — only a full container
#  restart re-opens the new file.)
#
# Rollback: restore default.conf from git + docker compose restart nginx.
# ═══════════════════════════════════════════════════════════════════════

upstream app {
    server app:5001;
}

# P8.1: next-app upstream. nginx routes public SEO pages here; everything
# else (auth, library, player, admin, /api/, /socket.io/) still goes to
# the legacy Express `app` service. P6/P7 will migrate more routes off
# `app` and onto `next_app` one location-block at a time.
upstream next_app {
    server next-app:3000;
}

# P2.8: ws-server upstream (socket.io danmaku). Defined now so the P9
# cutover only needs to flip the /socket.io/ proxy_pass below from
# `http://app` to `http://ws_server`. The container is healthy already
# (see docker-compose.yml ws-server service); it just isn't on the
# request path yet.
upstream ws_server {
    server ws-server:3001;
}

# P9 cutover: go-api upstream ENABLED. /api/ proxy_pass below switches
# from http://app to http://go_api. PORT_GO=8080 (docker-compose.yml
# go-api service; config.go envInt("PORT_GO", 8080)).
upstream go_api {
    server go-api:8080;
}

server {
    listen 80;
    server_name animegoclub.com;
    return 301 https://$host$request_uri;
}

# www -> root: keep all backlinks pointed at the canonical apex domain.
server {
    listen 80;
    server_name www.animegoclub.com;
    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.animegoclub.com;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    # `localhost` lets the same conf work for local `docker compose up`
    # smoke testing; the self-signed cert's SAN covers it.
    server_name animegoclub.com localhost;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ───────────────────────────────────────────────────────────────
    # P8.1 Day-1 Fix: server-level upstream defaults + maintenance page
    #
    # Timeouts:
    #   nginx ships 60s defaults for proxy_*_timeout. That's too generous
    #   when next-app is hung — clients wait a full minute for nginx to
    #   give up before the maintenance page kicks in. 5s connect / 30s
    #   read is plenty for SSR.
    #
    # Overrides:
    #   /socket.io/ — re-sets proxy_read_timeout to 86400 (24h, long-poll
    #                 + persistent WebSocket frames).
    #   /api/       — explicit proxy_read_timeout 30 (already matches
    #                 server default; kept for clarity).
    #
    # Fallback:
    #   error_page maps 502/503/504 to /maintenance.html with a forced
    #   503 status, but only the next_app locations flip
    #   proxy_intercept_errors to on. /api/ and /socket.io/ keep
    #   pass-through so RSC fetches and socket clients see real 5xx
    #   codes and handle them themselves instead of getting an HTML
    #   maintenance body where they expected JSON / a WS frame.
    # ───────────────────────────────────────────────────────────────
    proxy_connect_timeout 5s;
    proxy_send_timeout 10s;
    proxy_read_timeout 30s;

    error_page 502 503 504 =503 /maintenance.html;
    location = /maintenance.html {
        internal;
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store" always;
        # Don't let CF / browsers cache the maintenance body, otherwise
        # users see the 503 page long after next-app is healthy again.
    }

    # ───────────────────────────────────────────────────────────────
    # P8.1 partial cutover: routing precedence
    #
    # nginx location matching priority (highest first):
    #   1. `=  /path`      exact match
    #   2. `^~ /prefix/`   prefix-no-regex (stops processing)
    #   3. `~  /regex/`    regex match
    #   4. `   /prefix/`   longest prefix match
    #
    # Strategy:
    #   - WebSocket and /api/ keep going to legacy Express. Phase 8.5
    #     flips /api/ to go_api once that service ships.
    #   - The public SEO surface (root, /anime/, /seasonal/, /search,
    #     /welcome, /sitemap.xml, /robots.txt) and Next's own asset path
    #     (/_next/) go to next-app.
    #   - Everything else (login, register, library, player, admin,
    #     profile, calendar, faq, /u/, /forgot-password, etc.) falls
    #     through to the catch-all `location /` -> legacy Express.
    # ───────────────────────────────────────────────────────────────

    # P9: WebSocket (socket.io danmaku) now -> ws-server (was http://app).
    location /socket.io/ {
        proxy_pass http://ws_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # P9: API proxy now -> go-api (was http://app). next-app's RSC fetches
    # go directly to go-api:8080 via Docker DNS (GO_API_INTERNAL_URL),
    # NOT through this nginx path.
    location /api/ {
        proxy_pass http://go_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # ─── next-app routes ──────────────────────────────────────────────

    # Shared next-app proxy block — buffering off so RSC streaming /
    # loading.tsx Suspense boundaries flush chunks to the client as Next
    # produces them, instead of nginx holding the whole response.
    # Without this, every next-app page waits for the full SSR pass
    # before the first byte reaches the browser.
    #
    # next-app sends its own Cache-Control headers (Next 16 standalone),
    # so we do NOT define proxy_cache_path here. The previous
    # `proxy_cache_valid 200 1y` directive in /_next/ was a no-op
    # without proxy_cache_path declared.

    # Next.js static asset bundle. Longest-prefix match beats catch-all.
    location /_next/ {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Static, hash-named, immutable. Next ships its own
        # Cache-Control: public, max-age=31536000, immutable header.
        proxy_buffering on;
    }

    # Root (HomePage) - exact match overrides the catch-all `location /`.
    location = / {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # SEO entry-points - exact paths.
    location = /sitemap.xml {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /robots.txt {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /search - exact + query-string variants (nginx strips the query
    # before matching, so this catches /search?q=...). No trailing
    # slash; legacy has no /search/ sub-routes.
    location = /search {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Anime detail pages /anime/:id - prefix-no-regex match. Beats
    # any later prefix or catch-all.
    location ^~ /anime/ {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Seasonal /seasonal/:season/:year.
    #
    # `^~ /seasonal/` (prefix-no-regex, requires trailing slash in URI)
    # alone caused a redirect loop: bare /seasonal fell through to
    # `location /` -> Express, which had no /seasonal route but the
    # `^~ /seasonal/` block's presence makes nginx emit an implicit 301
    # "add trailing slash" for the bare form. Then next-app's default
    # trailingSlash=false 308'd /seasonal/ back to /seasonal → infinite.
    #
    # Fix: route both forms (bare + trailing-slash) at next-app, which
    # owns the canonical /seasonal index page (redirects to the current
    # season). The exact-match block also outranks the implicit
    # add-slash behaviour because `=` has the highest priority.
    location = /seasonal {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location ^~ /seasonal/ {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Admin (P7): /admin overview + /admin/enrichment + /admin/users.
    # next-app/src/proxy.ts gates this surface server-side: reads the
    # `session` cookie, verifies the JWT, 403s if role !== 'admin', and
    # 302s to /login otherwise. layout.tsx re-checks the role as
    # belt-and-suspenders. Bare `/admin` and `/admin/anything` both
    # land on next-app via this prefix.
    location ^~ /admin {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # Library + Player (P6): /library, /library/:seriesId, /player.
    # Same proxy.ts gate as /admin but without the role check — any
    # valid session can use the local library / player. layout.tsx
    # in both routes re-runs the cookie check as belt-and-suspenders.
    # Dexie + jassub + artplayer all live in 'use client' subtrees
    # behind dynamic({ssr:false}); the next-app container only serves
    # the shell + WASM assets, the heavy lifting happens in the
    # browser.
    location ^~ /library {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location ^~ /player {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # P9 — full auth surface ported to next-app. EXACT match for
    # /login, /register, /forgot-password; prefix match for
    # /reset-password/ since it carries a dynamic [token] segment.
    # Legacy /login-suffix / /register-suffix / /forgot-password-suffix
    # URLs (none today, but defensive) stay on Express via the catch-all.
    #
    # Trailing-slash forms 301 to the canonical bare path — without
    # this `/login/` etc. would fall through to the catch-all and hit
    # the legacy Express container, which has no such route and would
    # either 404 or render the old SPA shell.
    location = /login/ {
        return 301 /login;
    }
    location = /register/ {
        return 301 /register;
    }
    location = /forgot-password/ {
        return 301 /forgot-password;
    }
    location = /login {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location = /register {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location = /forgot-password {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    # Bare /reset-password (no token) is non-functional regardless of
    # backend — the page needs a [token] segment. Return 404 at the
    # nginx layer instead of letting it fall through to legacy Express,
    # which has no route for it either but would serve the SPA shell.
    location = /reset-password {
        return 404;
    }
    # /reset-password/<token> — prefix match because the token is a
    # dynamic Next.js segment. nginx never inspects the token; it just
    # forwards the path to next-app which resolves params.
    location ^~ /reset-password/ {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # /jassub/* is the WASM asset path under next-app/public/jassub/.
    # Routed through Next so its standard cache headers + COOP/COEP
    # apply. nginx-level caching could be tightened post-deploy.
    location ^~ /jassub/ {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Welcome / marketing page. EXACT match (no `^~ /welcome` prefix —
    # that would catch /welcomeXYZ /welcome2 /welcome-anything and route
    # them to next-app, breaking any future legacy URL with /welcome*
    # prefix. next-app has no /welcome/ sub-routes anyway.
    location = /welcome {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # /about (legacy URL, still receives external backlinks pointing at
    # the old marketing page) -> 301 to /welcome so search engines
    # consolidate link equity onto the canonical next-app route. Without
    # this, /about (legacy SPA) and /welcome (next-app RSC) are two
    # different URLs with the same content -> duplicate-content penalty.
    location = /about {
        return 301 /welcome;
    }

    # ─── P11 — profile / social / calendar / faq / season ────────────
    # These were the last legacy-SPA routes. P11 ported them to
    # next-app, so route them to next_app instead of letting them fall
    # through to the (now route-less) Express catch-all, which would 404
    # or serve a stale SPA shell. /profile rides the proxy.ts auth gate;
    # /u/* is public (OptionalAuth); /season 308-redirects to the live
    # /seasonal/<s>/<y> via next.config redirects().
    location ^~ /profile {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location ^~ /u/ {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location ^~ /calendar {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location ^~ /faq {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
    location = /season {
        proxy_pass http://next_app;
        proxy_intercept_errors on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    # ─── Catch-all -> legacy Express ─────────────────────────────────
    # After P11 every user-facing route is on next-app; this is now a
    # safety net for any unmigrated/unknown path. The legacy Express
    # `app` container can be retired once this is confirmed unused.
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Player /library route uses jassub (libass-wasm) for ASS subtitles.
    # jassub spawns emscripten pthread workers that need SharedArrayBuffer,
    # which is only exposed in a cross-origin isolated context.
    # credentialless (not require-corp) so AniList/Bangumi cover CDNs
    # (which don't send CORP) still load as no-cors no-credentials.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # script-src directives explained:
    #   'wasm-unsafe-eval' — jassub WebAssembly.compile / .instantiate (player)
    #   'unsafe-eval'      — emscripten `new Function(args, body)` for WASM
    #                        invoker trampolines inside jassub-worker.js;
    #                        without it renderer.ready never resolves
    #   'unsafe-inline'    — Next.js 16 streaming SSR emits inline
    #                        hydration bootstrap + Suspense flush scripts
    #                        that have no stable hash and cannot be
    #                        externalized. Without this, RSC hydrate fails
    #                        and the entire React tree unmounts to fallback.
    #                        Long-term fix: nonce-based CSP via next-app
    #                        middleware.ts (deferred to pre-P9 hardening).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob: wss://$host https://cloudflareinsights.com https://*.ingest.us.sentry.io; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    # Allow same-origin local-fonts permission (jassub CJK fallback via
    # navigator.queryLocalFonts). Default policy would have denied it.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), local-fonts=(self)" always;
}
