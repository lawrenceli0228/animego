upstream app {
    server app:5001;
}

# P8.1: next-app upstream. nginx routes public SEO pages here; everything
# else (auth, library, player, admin, /api/, /socket.io/) still goes to
# the legacy Express `app` service. P6/P7 will migrate more routes off
# `app` and onto `next_app` one location-block at a time.
upstream next_app {
    server next-app:3000;
}

# P2.8: ws-server upstream (socket.io danmaku). Defined now so the P9
# cutover only needs to flip the /socket.io/ proxy_pass below from
# `http://app` to `http://ws_server`. The container is healthy already
# (see docker-compose.yml ws-server service); it just isn't on the
# request path yet.
upstream ws_server {
    server ws-server:3001;
}

# P8.5 (planned): go-api upstream. After P8.5 shadow + P9 cutover,
# `/api/` proxy_pass switches from http://app to http://go_api.
# upstream go_api {
#     server go-api:8080;
# }

server {
    listen 80;
    server_name animegoclub.com;
    return 301 https://$host$request_uri;
}

# www -> root: keep all backlinks pointed at the canonical apex domain.
server {
    listen 80;
    server_name www.animegoclub.com;
    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    server_name www.animegoclub.com;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    return 301 https://animegoclub.com$request_uri;
}

server {
    listen 443 ssl;
    # `localhost` lets the same conf work for local `docker compose up`
    # smoke testing; the self-signed cert's SAN covers it.
    server_name animegoclub.com localhost;

    ssl_certificate /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    # Cloudflare real IP
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # ───────────────────────────────────────────────────────────────
    # P8.1 partial cutover: routing precedence
    #
    # nginx location matching priority (highest first):
    #   1. `=  /path`      exact match
    #   2. `^~ /prefix/`   prefix-no-regex (stops processing)
    #   3. `~  /regex/`    regex match
    #   4. `   /prefix/`   longest prefix match
    #
    # Strategy:
    #   - WebSocket and /api/ keep going to legacy Express. Phase 8.5
    #     flips /api/ to go_api once that service ships.
    #   - The public SEO surface (root, /anime/, /seasonal/, /search,
    #     /welcome, /sitemap.xml, /robots.txt) and Next's own asset path
    #     (/_next/) go to next-app.
    #   - Everything else (login, register, library, player, admin,
    #     profile, calendar, faq, /u/, /forgot-password, etc.) falls
    #     through to the catch-all `location /` -> legacy Express.
    # ───────────────────────────────────────────────────────────────

    # WebSocket (socket.io danmaku) - stays on legacy Express until P9.
    location /socket.io/ {
        proxy_pass http://app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API proxy -> legacy Express. P8.5 will switch upstream to go_api.
    # next-app's RSC fetches go directly to app:5001 via Docker DNS,
    # NOT through this nginx path.
    location /api/ {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30;
    }

    # ─── next-app routes ──────────────────────────────────────────────

    # Next.js static asset bundle. Longest-prefix match beats catch-all.
    location /_next/ {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Static assets can be cached aggressively; Next puts a hash in
        # every filename so we don't need to worry about staleness.
        proxy_cache_valid 200 1y;
    }

    # Root (HomePage) - exact match overrides the catch-all `location /`.
    location = / {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEO entry-points - exact paths.
    location = /sitemap.xml {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /robots.txt {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # /search - exact + query-string variants (nginx strips the query
    # before matching, so this catches /search?q=...). No trailing
    # slash; legacy has no /search/ sub-routes.
    location = /search {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Anime detail pages /anime/:id - prefix-no-regex match. Beats
    # any later prefix or catch-all.
    location ^~ /anime/ {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Seasonal /seasonal/:season/:year.
    location ^~ /seasonal/ {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Welcome / marketing page (moved from legacy /about; legacy /about
    # still works via the catch-all and shows the legacy LandingPage SPA).
    location ^~ /welcome {
        proxy_pass http://next_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Catch-all -> legacy Express ─────────────────────────────────
    # Everything not matched above (/library, /player, /admin, /profile,
    # /login, /register, /forgot-password, /reset-password/, /calendar,
    # /faq, /about, /u/, plus any URL not yet migrated) falls through here.
    location / {
        proxy_pass http://app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    # Player /library route uses jassub (libass-wasm) for ASS subtitles.
    # jassub spawns emscripten pthread workers that need SharedArrayBuffer,
    # which is only exposed in a cross-origin isolated context.
    # credentialless (not require-corp) so AniList/Bangumi cover CDNs
    # (which don't send CORP) still load as no-cors no-credentials.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    # script-src needs both 'wasm-unsafe-eval' (jassub WASM compile +
    # instantiate) AND 'unsafe-eval' (emscripten runtime calls
    # `new Function(args, body)` inside jassub-worker.js to build WASM
    # invoker trampolines - without it the worker throws EvalError and
    # renderer.ready never resolves). 'wasm-unsafe-eval' alone is
    # insufficient; it only covers WebAssembly.compile / .instantiate.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'wasm-unsafe-eval' https://static.cloudflareinsights.com; worker-src 'self' blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src 'self' blob:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' blob: wss://$host https://cloudflareinsights.com; frame-src 'none'; object-src 'none'; base-uri 'self';" always;
    # Allow same-origin local-fonts permission (jassub CJK fallback via
    # navigator.queryLocalFonts). Default policy would have denied it.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), local-fonts=(self)" always;
}
