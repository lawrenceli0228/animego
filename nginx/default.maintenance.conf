# Maintenance mode nginx config — P9 cutover 用。
#
# 怎么用:
#   ssh -p 57777 root@45.152.65.208 \
#     'cd /opt/animego && cp nginx/default.maintenance.conf nginx/default.conf \
#       && docker compose restart nginx'
#
# 整站对外 503 + maintenance.html,/api 和 /socket.io 也 503(让 client 报
# 错重试,而不是吃旧 cached 响应)。
#
# 用完恢复:cp nginx/default.legacy.conf nginx/default.conf(老 VPS 回滚)
#         或 git checkout nginx/default.conf(新 VPS 解 maintenance)
# 然后 docker compose restart nginx。
#
# 这文件 ssl_certificate 路径跟 default.conf 一致,maintenance.html 走
# docker-compose.yml bind-mount 已经在 /usr/share/nginx/html/ 下。
#
# 详见 docs/migration/P9-CUTOVER.md §8。

server {
    listen 80 default_server;
    listen 443 ssl default_server;
    http2 on;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/selfsigned.crt;
    ssl_certificate_key /etc/nginx/ssl/selfsigned.key;

    root /usr/share/nginx/html;

    location = /maintenance.html {
        internal;
        try_files /maintenance.html =404;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    location /api/ {
        add_header Cache-Control "no-store" always;
        return 503;
    }

    location /socket.io/ {
        add_header Cache-Control "no-store" always;
        return 503;
    }

    location / {
        return 503;
    }

    error_page 503 /maintenance.html;
}
