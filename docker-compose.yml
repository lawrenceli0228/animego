services:
  app:
    # Legacy Express + Mongo stack.  Stays live until P9 cutover; nginx
    # currently routes /api + /socket.io + / to this service.  P9 switches
    # /api → go-api and /socket.io → ws-server, then this service is
    # removed and `mongodb` follows on the +30d retention window.
    build: .
    restart: unless-stopped
    env_file: .env.production
    depends_on:
      - mongodb
    networks:
      - animego
    mem_limit: 400m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mongodb:
    # Removed at cutover + 30d.  Until then it backs `app` and the
    # parity-check binary that compares Express vs Go responses.
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    command: --wiredTigerCacheSizeGB 0.4
    networks:
      - animego
    mem_limit: 500m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── P8.1: next-app (Next.js 16 RSC) ─────────────────────────────────
  # Standalone Bun-built Next.js process. nginx routes public SEO pages
  # (/, /anime/, /seasonal/, /search, /welcome, /sitemap.xml, /robots.txt,
  # /_next/) to this service; everything else (auth, /library, /player,
  # /admin, /api/*, /socket.io/) stays on the legacy `app` Express
  # service. RSC fetches go to `app:5001` directly via the Docker
  # network (GO_API_INTERNAL_URL), NOT through nginx, since Express
  # serves the same byte-compatible envelope go-api produces. Phase 8.5
  # flips RSC fetches to go_api:8080 once that service deploys.
  next-app:
    build:
      context: .
      dockerfile: next-app/Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      # RSC server-side fetch base. Points at the Express container by
      # service name (Docker DNS resolves it). When Go API ships to
      # prod (P8.5), flip this to http://go-api:8080.
      GO_API_INTERNAL_URL: http://app:5001
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      # Server-side timezone. Without this the container defaults to UTC
      # and any toLocaleTimeString / toLocaleDateString call SSR-renders
      # a different string than the client (browser local TZ) →
      # React error #418 hydration text mismatch. Asia/Shanghai matches
      # the primary user base (CN/HK/TW/海外华人). Browser-side TZ
      # outliers (US/EU users) will still mismatch — those callsites
      # need suppressHydrationWarning as a separate fix.
      TZ: Asia/Shanghai
    depends_on:
      - app
    networks:
      - animego
    healthcheck:
      # Use 127.0.0.1 not localhost: alpine resolves localhost to ::1
      # first, but next 16 standalone server only binds the IPv4
      # wildcard (HOSTNAME=0.0.0.0). v6 connect fails, container shows
      # unhealthy even though every external request works.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/healthz"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 30s
    mem_limit: 512m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # ─── P2.8: ws-server (socket.io danmaku) ─────────────────────────────
  # Standalone Node 20 process speaking the socket.io v4 protocol that
  # client/src/hooks/useDanmaku.js already uses.  Reads JWT_SECRET shared
  # with go-api + the Express `app` service so a single login token works
  # for all three surfaces.  Writes danmakus + episode_windows directly
  # to Postgres (P9 cutover wires this in; until then the service is
  # built and healthy but receives no traffic because nginx still
  # routes /socket.io → `app`).
  ws-server:
    build:
      context: ./ws-server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env.production
    environment:
      PORT_WS: 3001
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    # NOTE: prod postgres service is added in the P9 cutover commit;
    # ws-server's DATABASE_URL in .env.production points at the postgres
    # host that will exist by then.  Listing it as depends_on here would
    # break `docker compose up` today.
    networks:
      - animego
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 3s
      retries: 3
      start_period: 5s
    mem_limit: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/selfsigned.crt:/etc/nginx/ssl/selfsigned.crt:ro
      - ./nginx/selfsigned.key:/etc/nginx/ssl/selfsigned.key:ro
      # P8.1 Day-1 Fix: static maintenance page served as the `error_page`
      # target whenever next-app is unreachable (default.conf 502/503/504
      # `@next_app_down`) or whenever a P6/P7/P9 surface is requested while
      # nginx is on default.legacy.conf rollback (Express has no handler).
      # Bind-mount, not COPY, so editing the file + `docker compose restart
      # nginx` is enough — no image rebuild.
      - ./nginx/maintenance.html:/usr/share/nginx/html/maintenance.html:ro
    depends_on:
      - app
      - next-app
    networks:
      - animego
    mem_limit: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mongo-data:

networks:
  animego:
