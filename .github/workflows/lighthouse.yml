name: Lighthouse CI

on:
  pull_request:
    branches: [main, feat/go-backend]
  push:
    branches: [main]
  workflow_dispatch:

# Only one Lighthouse run per branch in flight at a time —
# multiple runs against the same live URL set produce noisy budget signals.
concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse against live prod
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Lighthouse CI
        run: bun add -g @lhci/cli@0.14

      - name: Run Lighthouse CI
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
        run: lhci autorun
