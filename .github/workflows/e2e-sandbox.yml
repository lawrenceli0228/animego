name: E2E Sandbox (Playwright + docker compose)
# v2 sandbox suite — boots the full docker-compose stack on the runner
# and runs write-path specs under e2e/specs/sandbox/**. Distinct from
# .github/workflows/e2e.yml (v1, read-only, points at live prod).
#
# Required GitHub Secret:
#   ENV_PRODUCTION — multiline secret holding the entire .env.production
#                    file body. Create from a local machine with:
#                      gh secret set ENV_PRODUCTION < .env.production
#
# Mongo port override:
#   docker-compose.yml does NOT expose 27017 to the host (prod-correct).
#   docker-compose.ci.yml adds `ports: ["27017:27017"]` so fixture code
#   running on the GitHub runner (mongodb://localhost:27017) can reach
#   the container. The override is committed at repo root and only
#   merged in this workflow.

on:
  pull_request:
    branches: [main, feat/go-backend]
  workflow_dispatch:

concurrency:
  group: e2e-sandbox-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e-sandbox:
    name: Playwright against docker compose stack
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Write .env.production from secret
        env:
          ENV_PRODUCTION: ${{ secrets.ENV_PRODUCTION }}
        run: |
          echo "$ENV_PRODUCTION" > .env.production
          chmod 600 .env.production

      - name: Boot docker compose stack
        # --wait blocks until every service with a healthcheck reports
        # healthy. --wait-timeout 120 caps at 2 min so a hung container
        # fails the job instead of eating the whole timeout-minutes.
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.ci.yml \
            --env-file=.env.production \
            up -d --wait --wait-timeout 120

      - name: Sanity-check stack
        # End-to-end probe: nginx (443) → Express app (/api/health).
        # On failure dump the last 50 lines of every container so the
        # PR comment has something to debug from.
        run: |
          curl -ksf https://localhost/api/health || (docker compose logs --tail=50 && exit 1)

      - name: Install e2e deps
        working-directory: e2e
        run: bun install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: e2e
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright (sandbox project only)
        working-directory: e2e
        env:
          E2E_SANDBOX_BASE_URL: https://localhost
          MONGO_URL: mongodb://localhost:27017
          CI: "true"
        run: bunx playwright test --project=chromium-sandbox

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-sandbox
          path: e2e/playwright-report/
          retention-days: 14

      - name: Tear down stack
        if: always()
        # -v wipes the mongo-data volume so the next run starts clean.
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v
