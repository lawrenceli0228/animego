name: 🐛 Bug report
description: Report a problem with AnimeGo
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report. Please fill out the sections below.
        **Do not** use this form for security vulnerabilities — see
        [SECURITY.md](https://github.com/lawrenceli0228/animego/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Player / danmaku / subtitles
        - Discovery / search / seasonal / tracking
        - Auth / account
        - Performance / SEO
        - Other / not sure
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Browser, OS, device, and — if self-hosting — stack versions.
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: This is not a security vulnerability (those go through SECURITY.md).
          required: true
