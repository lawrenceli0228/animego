name: 💡 Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Note: the torrent/magnet metadata-search subsystem is
        **out of scope** for external contributions (see
        [CONTRIBUTING.md](https://github.com/lawrenceli0228/animego/blob/main/CONTRIBUTING.md)),
        though you're welcome to discuss it.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem does this solve, and who is it for?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and discussions, and this isn't a duplicate.
          required: true
